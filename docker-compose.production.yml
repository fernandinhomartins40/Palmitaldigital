x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-palmital}
      POSTGRES_USER: ${POSTGRES_USER:-palmital}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - palmital-postgres-data:/var/lib/postgresql/data
    networks:
      - palmital-internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h 127.0.0.1 || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  migrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.migrator
    logging: *default-logging
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-palmital}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-palmital}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123456}
      SEED_TEST_PASSWORD: ${SEED_TEST_PASSWORD:-Teste123456}
    networks:
      - palmital-internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: production
      args:
        RELEASE_VERSION: ${RELEASE_VERSION:-dev}
    restart: unless-stopped
    logging: *default-logging
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-palmital}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-palmital}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-https://www.palmitaldigital.com.br}
      PORT: 3001
      NODE_ENV: production
    volumes:
      - palmital-uploads:/app/uploads
      - palmital-logs:/app/logs
    networks:
      - palmital-internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:3001/health | grep -q '\"status\":\"ok\"' || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      target: production
      args:
        VITE_API_URL: /api/v1
        VITE_WS_URL: ""
        RELEASE_VERSION: ${RELEASE_VERSION:-dev}
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${DEPLOY_PORT:-7000}:3000"
    networks:
      - palmital-internal
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:3000/health | grep -q '\"status\":\"ok\"' || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  palmital-postgres-data:
    external: true
  palmital-uploads:
    external: true
  palmital-logs:
    external: true

networks:
  palmital-internal:
    driver: bridge
