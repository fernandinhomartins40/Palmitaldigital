services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-palmital}
      POSTGRES_USER: ${POSTGRES_USER:-palmital}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - palmital-postgres-data:/var/lib/postgresql/data
    networks:
      - palmital-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-palmital}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: .
      dockerfile: docker/Dockerfile.migrator
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-palmital}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-palmital}
    networks:
      - palmital-internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: production
      args:
        RELEASE_VERSION: ${RELEASE_VERSION:-dev}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-palmital}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-palmital}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-https://palmitaldigital.com.br}
      PORT: 3001
      NODE_ENV: production
    volumes:
      - palmital-uploads:/app/uploads
      - palmital-logs:/app/logs
    networks:
      - palmital-internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      target: production
      args:
        VITE_API_URL: /api/v1
        VITE_WS_URL: ""
        RELEASE_VERSION: ${RELEASE_VERSION:-dev}
    restart: unless-stopped
    ports:
      - "7000:80"
    networks:
      - palmital-internal
    depends_on:
      - api

volumes:
  palmital-postgres-data:
    external: true
  palmital-uploads:
    external: true
  palmital-logs:
    external: true

networks:
  palmital-internal:
    driver: bridge
