name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  VPS_HOST: 72.60.10.112
  VPS_USER: root
  APP_ROOT: /opt/palmital
  DEPLOY_PORT: "7000"
  PRIMARY_DOMAIN: palmitaldigital.com.br
  SECONDARY_DOMAIN: www.palmitaldigital.com.br
  SSL_EMAIL: admin@palmitaldigital.com.br

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 45

    environment:
      name: production
      url: https://www.palmitaldigital.com.br

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version
        id: release
        run: echo "version=$(git rev-parse --short HEAD)-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Upload source to VPS
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            "mkdir -p ${{ env.APP_ROOT }}/releases/${{ steps.release.outputs.version }}"
          sshpass -e rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='apps/api/node_modules' \
            --exclude='apps/web/node_modules' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.APP_ROOT }}/releases/${{ steps.release.outputs.version }}/

      - name: Ensure .env exists on VPS
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash << 'ENDSSH'
            set -euo pipefail
            ENV_FILE="/opt/palmital/.env"
            mkdir -p /opt/palmital

            # Recreate .env if it doesn't exist OR if POSTGRES_PASSWORD is empty/missing
            # (an earlier deploy may have written the file with blank values via heredoc indentation)
            EXISTING_PW=$(grep '^POSTGRES_PASSWORD=' "$ENV_FILE" 2>/dev/null | cut -d= -f2- | tr -d '[:space:]' || true)
            if [ ! -f "$ENV_FILE" ] || [ -z "$EXISTING_PW" ]; then
              echo "Creating/fixing $ENV_FILE with generated secrets..."
              POSTGRES_PASSWORD=$(openssl rand -hex 32)
              JWT_SECRET=$(openssl rand -hex 32)
              JWT_REFRESH_SECRET=$(openssl rand -hex 32)
              SEED_ADMIN_PASSWORD=$(openssl rand -hex 12)
              printf 'POSTGRES_USER=palmital\n' > "$ENV_FILE"
              printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD" >> "$ENV_FILE"
              printf 'POSTGRES_DB=palmital\n' >> "$ENV_FILE"
              printf 'DATABASE_URL=postgresql://palmital:%s@postgres:5432/palmital\n' "$POSTGRES_PASSWORD" >> "$ENV_FILE"
              printf 'JWT_SECRET=%s\n' "$JWT_SECRET" >> "$ENV_FILE"
              printf 'JWT_REFRESH_SECRET=%s\n' "$JWT_REFRESH_SECRET" >> "$ENV_FILE"
              printf 'JWT_EXPIRES_IN=15m\n' >> "$ENV_FILE"
              printf 'JWT_REFRESH_EXPIRES_IN=30d\n' >> "$ENV_FILE"
              printf 'NODE_ENV=production\n' >> "$ENV_FILE"
              printf 'PORT=3001\n' >> "$ENV_FILE"
              printf 'FRONTEND_URL=https://palmitaldigital.com.br\n' >> "$ENV_FILE"
              printf 'SEED_ADMIN_PASSWORD=%s\n' "$SEED_ADMIN_PASSWORD" >> "$ENV_FILE"
              chmod 600 "$ENV_FILE"
              echo ".env created/fixed successfully"
            else
              echo ".env already exists with valid POSTGRES_PASSWORD, skipping"
            fi
          ENDSSH

      - name: Deploy on VPS
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash << ENDSSH
            set -euo pipefail

            RELEASE="${{ steps.release.outputs.version }}"
            APP_ROOT="${{ env.APP_ROOT }}"
            RELEASE_DIR="\$APP_ROOT/releases/\$RELEASE"
            CURRENT_DIR="\$APP_ROOT/current"
            ENV_FILE="\$APP_ROOT/.env"

            # Create required Docker volumes (preserving data)
            docker volume create palmital-postgres-data 2>/dev/null || true
            docker volume create palmital-uploads 2>/dev/null || true
            docker volume create palmital-logs 2>/dev/null || true

            # ── CLEANUP: stop and remove all containers from previous deploys ──
            # Uses compose project label filter so volumes are never touched
            echo "Stopping previous palmital containers..."
            PALMITAL_CONTAINERS=\$(docker ps -aq --filter "label=com.docker.compose.project=palmital" 2>/dev/null || true)
            if [ -n "\$PALMITAL_CONTAINERS" ]; then
              docker stop \$PALMITAL_CONTAINERS 2>/dev/null || true
              docker rm   \$PALMITAL_CONTAINERS 2>/dev/null || true
              echo "Removed previous containers"
            else
              echo "No previous containers found"
            fi
            # Remove dangling networks from old compose projects
            docker network prune -f --filter "label=com.docker.compose.project=palmital" 2>/dev/null || true

            # Copy env file into release
            cp "\$ENV_FILE" "\$RELEASE_DIR/.env"
            echo "RELEASE_VERSION=\$RELEASE" >> "\$RELEASE_DIR/.env"

            # Build images
            cd "\$RELEASE_DIR"
            docker compose -p palmital -f docker-compose.production.yml --env-file .env build \
              --build-arg RELEASE_VERSION="\$RELEASE" \
              --no-cache

            # Start postgres first so we can capture logs if it fails
            echo "Starting postgres..."
            docker compose -p palmital -f docker-compose.production.yml --env-file .env up -d postgres
            echo "Waiting for postgres to be healthy (up to 135s)..."
            for i in \$(seq 1 27); do
              PG_STATUS=\$(docker inspect --format='{{.State.Health.Status}}' palmital-postgres-1 2>/dev/null || echo "not_found")
              echo "  postgres[\$i/27]: \$PG_STATUS"
              if [ "\$PG_STATUS" = "healthy" ]; then
                echo "Postgres is healthy"
                break
              fi
              if [ "\$PG_STATUS" = "unhealthy" ] || [ "\$i" -eq 27 ]; then
                echo "ERROR: postgres failed to become healthy. Container logs:" >&2
                docker logs palmital-postgres-1 --tail=100 >&2
                exit 1
              fi
              sleep 5
            done

            # Run migrations (postgres already healthy — no dependency wait needed)
            docker compose -p palmital -f docker-compose.production.yml --env-file .env run --rm migrator

            # Swap current symlink atomically
            ln -sfn "\$RELEASE_DIR" "\$APP_ROOT/current_new"
            mv -Tf "\$APP_ROOT/current_new" "\$CURRENT_DIR"

            # Start services
            cd "\$CURRENT_DIR"
            docker compose -p palmital -f docker-compose.production.yml --env-file .env up -d --remove-orphans postgres api web

            # Verify api and web containers actually started (catch immediate crashes)
            echo "Waiting 15s for containers to stabilize..."
            sleep 15
            for SERVICE in api web; do
              CONTAINER="palmital-\${SERVICE}-1"
              STATUS=\$(docker inspect --format='{{.State.Status}}' "\$CONTAINER" 2>/dev/null || echo "not_found")
              echo "  \$CONTAINER: \$STATUS"
              if [ "\$STATUS" != "running" ]; then
                echo "ERROR: \$CONTAINER failed to start (status: \$STATUS)" >&2
                docker logs "\$CONTAINER" --tail=80 >&2 || true
                exit 1
              fi
            done

            # Wait for API health
            echo "Waiting for API to be healthy..."
            for i in \$(seq 1 30); do
              API_STATUS=\$(docker inspect --format='{{.State.Status}}' palmital-api-1 2>/dev/null || echo "not_found")
              if [ "\$API_STATUS" != "running" ]; then
                echo "ERROR: API container stopped unexpectedly (status: \$API_STATUS)" >&2
                docker logs palmital-api-1 --tail=80 >&2 || true
                exit 1
              fi
              if docker exec palmital-api-1 curl -sf http://localhost:3001/health 2>/dev/null | grep -q '"status"'; then
                echo "API is healthy after \${i}0s"
                break
              fi
              if [ "\$i" -eq 30 ]; then
                echo "API did not become healthy in 300s" >&2
                docker logs palmital-api-1 --tail=80 >&2
                exit 1
              fi
              sleep 10
            done

            # Verify release version
            DEPLOYED_VERSION=\$(docker exec palmital-api-1 cat /app/.release-version 2>/dev/null || echo "")
            if [ "\$DEPLOYED_VERSION" != "\$RELEASE" ]; then
              echo "Release version mismatch: expected=\$RELEASE got=\$DEPLOYED_VERSION" >&2
              exit 1
            fi
            echo "Release version verified: \$DEPLOYED_VERSION"

            # Clean up old releases (keep last 3)
            ls -dt "\$APP_ROOT/releases"/*/ 2>/dev/null | tail -n +4 | xargs rm -rf 2>/dev/null || true
          ENDSSH

      - name: Configure Nginx (HTTP)
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash << 'ENDSSH'
            set -euo pipefail
            mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled
            cat > /etc/nginx/sites-available/palmital << 'NGINX'
          server {
              listen 80;
              server_name palmitaldigital.com.br www.palmitaldigital.com.br;

              location /.well-known/acme-challenge/ {
                  root /var/www/certbot;
              }

              location / {
                  proxy_pass http://127.0.0.1:7000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 86400;
              }
          }
          NGINX
            ln -sf /etc/nginx/sites-available/palmital /etc/nginx/sites-enabled/palmital
            nginx -t && systemctl reload nginx
          ENDSSH

      - name: Obtain SSL certificate
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash << ENDSSH
            set -euo pipefail
            mkdir -p /var/www/certbot
            if [ ! -f "/etc/letsencrypt/live/${{ env.PRIMARY_DOMAIN }}/fullchain.pem" ]; then
              certbot certonly --webroot \
                -w /var/www/certbot \
                -d ${{ env.PRIMARY_DOMAIN }} \
                -d ${{ env.SECONDARY_DOMAIN }} \
                --email ${{ env.SSL_EMAIL }} \
                --agree-tos \
                --non-interactive || true
            else
              certbot renew --quiet --no-self-upgrade 2>/dev/null || true
            fi
          ENDSSH

      - name: Configure Nginx (HTTPS)
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash << ENDSSH
            set -euo pipefail
            if [ ! -f "/etc/letsencrypt/live/${{ env.PRIMARY_DOMAIN }}/fullchain.pem" ]; then
              echo "SSL cert not found, keeping HTTP-only config"
              exit 0
            fi
            cat > /etc/nginx/sites-available/palmital << 'NGINX'
          server {
              listen 80;
              server_name palmitaldigital.com.br www.palmitaldigital.com.br;
              return 301 https://www.palmitaldigital.com.br\$request_uri;
          }

          server {
              listen 443 ssl http2;
              server_name palmitaldigital.com.br www.palmitaldigital.com.br;

              ssl_certificate /etc/letsencrypt/live/palmitaldigital.com.br/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/palmitaldigital.com.br/privkey.pem;
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_ciphers HIGH:!aNULL:!MD5;

              location / {
                  proxy_pass http://127.0.0.1:7000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_read_timeout 86400;
              }
          }
          NGINX
            nginx -t && systemctl reload nginx
          ENDSSH

      - name: Post-deploy health check
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash << 'ENDSSH'
            echo "Running post-deploy health check..."
            for i in $(seq 1 24); do
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://localhost:7000/health 2>/dev/null || true)
              if [ "$HTTP_STATUS" = "200" ]; then
                echo "Health check passed: HTTP $HTTP_STATUS"
                exit 0
              fi
              echo "Attempt $i/24: HTTP $HTTP_STATUS, retrying in 5s..."
              sleep 5
            done
            echo "Health check failed after 120s" >&2
            echo "--- All container states ---" >&2
            docker ps -a --filter "name=palmital" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" >&2 || true
            echo "--- API logs ---" >&2
            docker logs palmital-api-1 --tail=40 >&2 || true
            echo "--- Web logs ---" >&2
            docker logs palmital-web-1 --tail=40 >&2 || true
            exit 1
          ENDSSH

      - name: Notify success
        run: |
          echo "Deployment ${{ steps.release.outputs.version }} completed successfully"
          echo "URL: https://www.palmitaldigital.com.br"
