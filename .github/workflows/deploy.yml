name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  VPS_HOST: 72.60.10.112
  VPS_USER: root
  APP_ROOT: /opt/palmital
  DEPLOY_PORT: "7000"
  PRIMARY_DOMAIN: palmitaldigital.com.br
  SECONDARY_DOMAIN: www.palmitaldigital.com.br
  CANONICAL_URL: https://www.palmitaldigital.com.br
  SSL_EMAIL: admin@palmitaldigital.com.br

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 45

    environment:
      name: production
      url: https://www.palmitaldigital.com.br

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version
        id: release
        run: echo "version=$(git rev-parse --short HEAD)-$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Upload source to VPS
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          RELEASE_DIR="${{ env.APP_ROOT }}/releases/${{ steps.release.outputs.version }}"
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            "mkdir -p '$RELEASE_DIR'"

          tar \
            --exclude=.git \
            --exclude=.claude \
            --exclude=node_modules \
            --exclude=apps/api/node_modules \
            --exclude=apps/web/node_modules \
            --exclude=apps/api/dist \
            --exclude=apps/web/dist \
            --exclude=apps/api/tsconfig.tsbuildinfo \
            -czf - . | \
            sshpass -e ssh -o StrictHostKeyChecking=no ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
              "tar -xzf - -C '$RELEASE_DIR'"

      - name: Prepare VPS runtime
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "bash -s" <<'ENDSSH'
            set -euo pipefail

            if ! command -v apt-get >/dev/null 2>&1; then
              echo "Unsupported VPS distribution: apt-get is required" >&2
              exit 1
            fi

            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends \
              ca-certificates \
              certbot \
              curl \
              nginx \
              openssl \
              tar

            if ! command -v docker >/dev/null 2>&1; then
              apt-get install -y --no-install-recommends docker.io
            fi

            if ! docker compose version >/dev/null 2>&1; then
              apt-get install -y --no-install-recommends docker-compose-v2 || \
              apt-get install -y --no-install-recommends docker-compose-plugin
            fi

            systemctl enable --now docker
            systemctl enable --now nginx

            docker compose version >/dev/null
            nginx -v >/dev/null 2>&1
            certbot --version >/dev/null
          ENDSSH

      - name: Ensure .env exists on VPS
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            "APP_ROOT='${{ env.APP_ROOT }}' CANONICAL_URL='${{ env.CANONICAL_URL }}' DEPLOY_PORT='${{ env.DEPLOY_PORT }}' bash -s" <<'ENDSSH'
            set -euo pipefail

            ENV_FILE="$APP_ROOT/.env"
            mkdir -p "$APP_ROOT"
            touch "$ENV_FILE"
            chmod 600 "$ENV_FILE"

            get_env() {
              local key="$1"
              awk -F= -v key="$key" '$1 == key { sub(/^[^=]*=/, "", $0); print $0; exit }' "$ENV_FILE"
            }

            upsert_env() {
              local key="$1"
              local value="$2"
              local tmp_file
              tmp_file="$(mktemp)"
              awk -v key="$key" -v value="$value" '
                BEGIN { updated = 0 }
                index($0, key "=") == 1 { print key "=" value; updated = 1; next }
                { print }
                END { if (!updated) print key "=" value }
              ' "$ENV_FILE" > "$tmp_file"
              mv "$tmp_file" "$ENV_FILE"
            }

            ensure_env() {
              local key="$1"
              local default_value="$2"
              local current_value
              current_value="$(get_env "$key" | tr -d '\r')"
              if [ -z "$current_value" ]; then
                upsert_env "$key" "$default_value"
              fi
            }

            ensure_random_hex() {
              local key="$1"
              local bytes="$2"
              local current_value
              current_value="$(get_env "$key" | tr -d '\r')"
              if [ -z "$current_value" ]; then
                upsert_env "$key" "$(openssl rand -hex "$bytes")"
              fi
            }

            ensure_random_alnum() {
              local key="$1"
              local length="$2"
              local current_value
              current_value="$(get_env "$key" | tr -d '\r')"
              if [ -z "$current_value" ]; then
                upsert_env "$key" "$(openssl rand -hex 32 | cut -c1-"$length")"
              fi
            }

            ensure_env "POSTGRES_USER" "palmital"
            ensure_env "POSTGRES_DB" "palmital"
            ensure_random_hex "POSTGRES_PASSWORD" 32
            ensure_random_hex "JWT_SECRET" 32
            ensure_random_hex "JWT_REFRESH_SECRET" 32
            ensure_env "JWT_EXPIRES_IN" "15m"
            ensure_env "JWT_REFRESH_EXPIRES_IN" "30d"
            ensure_random_alnum "SEED_ADMIN_PASSWORD" 20

            upsert_env "NODE_ENV" "production"
            upsert_env "PORT" "3001"
            upsert_env "DEPLOY_PORT" "$DEPLOY_PORT"
            upsert_env "FRONTEND_URL" "$CANONICAL_URL"

            POSTGRES_USER_VALUE="$(get_env "POSTGRES_USER" | tr -d '\r')"
            POSTGRES_PASSWORD_VALUE="$(get_env "POSTGRES_PASSWORD" | tr -d '\r')"
            POSTGRES_DB_VALUE="$(get_env "POSTGRES_DB" | tr -d '\r')"
            upsert_env "DATABASE_URL" "postgresql://${POSTGRES_USER_VALUE}:${POSTGRES_PASSWORD_VALUE}@postgres:5432/${POSTGRES_DB_VALUE}"

            chmod 600 "$ENV_FILE"
          ENDSSH

      - name: Deploy on VPS
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            "APP_ROOT='${{ env.APP_ROOT }}' RELEASE='${{ steps.release.outputs.version }}' DEPLOY_PORT='${{ env.DEPLOY_PORT }}' bash -s" <<'ENDSSH'
            set -euo pipefail

            RELEASE_DIR="$APP_ROOT/releases/$RELEASE"
            CURRENT_DIR="$APP_ROOT/current"
            ROOT_ENV_FILE="$APP_ROOT/.env"
            COMPOSE_FILE="$RELEASE_DIR/docker-compose.production.yml"
            ENV_FILE="$RELEASE_DIR/.env"

            compose() {
              docker compose -p palmital -f "$COMPOSE_FILE" --env-file "$ENV_FILE" "$@"
            }

            service_id() {
              compose ps -q "$1"
            }

            service_state() {
              local id
              id="$(service_id "$1")"
              if [ -z "$id" ]; then
                echo "not_found"
                return
              fi
              docker inspect --format '{{.State.Status}}' "$id" 2>/dev/null || echo "not_found"
            }

            service_health() {
              local id
              id="$(service_id "$1")"
              if [ -z "$id" ]; then
                echo "not_found"
                return
              fi
              docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}no_healthcheck{{end}}' "$id" 2>/dev/null || echo "not_found"
            }

            dump_service_logs() {
              local service="$1"
              echo "--- logs: $service ---" >&2
              compose logs --no-color --tail=100 "$service" >&2 || true
            }

            promote_release() {
              ln -sfn "$RELEASE_DIR" "$CURRENT_DIR"

              CURRENT_TARGET="$(readlink -f "$CURRENT_DIR" 2>/dev/null || true)"
              if [ "$CURRENT_TARGET" != "$RELEASE_DIR" ]; then
                echo "Failed to promote release: current=$CURRENT_TARGET expected=$RELEASE_DIR" >&2
                exit 1
              fi

              echo "Current release promoted to $CURRENT_TARGET"
            }

            wait_for_service_state() {
              local service="$1"
              local desired_state="$2"
              local attempts="$3"
              local delay_seconds="$4"
              local i
              local state

              for i in $(seq 1 "$attempts"); do
                state="$(service_state "$service")"
                echo "  $service[$i/$attempts]: state=$state"
                if [ "$state" = "$desired_state" ]; then
                  return 0
                fi
                if [ "$state" = "exited" ] || [ "$state" = "dead" ]; then
                  dump_service_logs "$service"
                  return 1
                fi
                sleep "$delay_seconds"
              done

              dump_service_logs "$service"
              return 1
            }

            wait_for_service_health() {
              local service="$1"
              local attempts="$2"
              local delay_seconds="$3"
              local i
              local state
              local health

              for i in $(seq 1 "$attempts"); do
                state="$(service_state "$service")"
                health="$(service_health "$service")"
                echo "  $service[$i/$attempts]: state=$state health=$health"

                if [ "$state" = "exited" ] || [ "$state" = "dead" ]; then
                  dump_service_logs "$service"
                  return 1
                fi

                if [ "$health" = "healthy" ] || [ "$health" = "no_healthcheck" ]; then
                  return 0
                fi

                sleep "$delay_seconds"
              done

              dump_service_logs "$service"
              return 1
            }

            docker volume create palmital-postgres-data >/dev/null
            docker volume create palmital-uploads >/dev/null
            docker volume create palmital-logs >/dev/null

            cp "$ROOT_ENV_FILE" "$ENV_FILE"
            printf 'RELEASE_VERSION=%s\n' "$RELEASE" >> "$ENV_FILE"

            cd "$RELEASE_DIR"
            compose build --no-cache

            echo "Starting postgres..."
            compose up -d postgres
            wait_for_service_state postgres running 24 5
            wait_for_service_health postgres 36 5

            echo "Running migrations..."
            compose run --rm migrator

            echo "Starting application services..."
            compose up -d --remove-orphans postgres api web

            wait_for_service_state api running 24 5
            wait_for_service_health api 36 5
            wait_for_service_state web running 24 5
            wait_for_service_health web 30 5

            API_ID="$(service_id api)"
            DEPLOYED_VERSION="$(docker exec "$API_ID" cat /app/.release-version 2>/dev/null || true)"
            if [ "$DEPLOYED_VERSION" != "$RELEASE" ]; then
              echo "Release version mismatch: expected=$RELEASE got=$DEPLOYED_VERSION" >&2
              exit 1
            fi

            echo "Verifying external port health..."
            for i in $(seq 1 18); do
              if curl -fsS --max-time 5 "http://127.0.0.1:${DEPLOY_PORT}/health" | grep -q '"status":"ok"'; then
                echo "Port ${DEPLOY_PORT} verified"
                break
              fi

              echo "  port[$i/18]: waiting for http://127.0.0.1:${DEPLOY_PORT}/health"

              if [ "$i" -eq 18 ]; then
                dump_service_logs api
                dump_service_logs web
                echo "--- port bindings ---" >&2
                ss -tlnp 2>/dev/null | grep -E "${DEPLOY_PORT}|3000|3001" >&2 || true
                exit 1
              fi

              sleep 5
            done

            promote_release

            ls -dt "$APP_ROOT/releases"/*/ 2>/dev/null | tail -n +4 | xargs rm -rf 2>/dev/null || true
          ENDSSH

      - name: Configure Nginx (HTTP)
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            "DEPLOY_PORT='${{ env.DEPLOY_PORT }}' PRIMARY_DOMAIN='${{ env.PRIMARY_DOMAIN }}' SECONDARY_DOMAIN='${{ env.SECONDARY_DOMAIN }}' bash -s" <<'ENDSSH'
            set -euo pipefail

            mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled
            {
              printf '%s\n' 'server {'
              printf '%s\n' '    listen 80;'
              printf '%s\n' "    server_name ${PRIMARY_DOMAIN} ${SECONDARY_DOMAIN};"
              printf '%s\n' ''
              printf '%s\n' '    location /.well-known/acme-challenge/ {'
              printf '%s\n' '        root /var/www/certbot;'
              printf '%s\n' '    }'
              printf '%s\n' ''
              printf '%s\n' '    location / {'
              printf '%s\n' "        proxy_pass http://127.0.0.1:${DEPLOY_PORT};"
              printf '%s\n' '        proxy_http_version 1.1;'
              printf '%s\n' '        proxy_set_header Upgrade $http_upgrade;'
              printf '%s\n' '        proxy_set_header Connection "upgrade";'
              printf '%s\n' '        proxy_set_header Host $host;'
              printf '%s\n' '        proxy_set_header X-Real-IP $remote_addr;'
              printf '%s\n' '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;'
              printf '%s\n' '        proxy_set_header X-Forwarded-Proto $scheme;'
              printf '%s\n' '        proxy_read_timeout 86400;'
              printf '%s\n' '    }'
              printf '%s\n' '}'
            } > /etc/nginx/sites-available/palmital

            ln -sf /etc/nginx/sites-available/palmital /etc/nginx/sites-enabled/palmital
            nginx -t
            systemctl reload nginx
          ENDSSH

      - name: Obtain SSL certificate
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            "PRIMARY_DOMAIN='${{ env.PRIMARY_DOMAIN }}' SECONDARY_DOMAIN='${{ env.SECONDARY_DOMAIN }}' SSL_EMAIL='${{ env.SSL_EMAIL }}' bash -s" <<'ENDSSH'
            set -euo pipefail

            mkdir -p /var/www/certbot
            pkill -f certbot 2>/dev/null || true
            sleep 2

            if [ ! -f "/etc/letsencrypt/live/${PRIMARY_DOMAIN}/fullchain.pem" ]; then
              if ! certbot certonly --webroot \
                -w /var/www/certbot \
                -d "$PRIMARY_DOMAIN" \
                -d "$SECONDARY_DOMAIN" \
                --email "$SSL_EMAIL" \
                --agree-tos \
                --non-interactive; then
                echo "Warning: certbot failed, keeping HTTP-only config for this deploy" >&2
              fi
            else
              echo "Certificate already exists, skipping renewal"
            fi
          ENDSSH

      - name: Configure Nginx (HTTPS)
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            "DEPLOY_PORT='${{ env.DEPLOY_PORT }}' PRIMARY_DOMAIN='${{ env.PRIMARY_DOMAIN }}' SECONDARY_DOMAIN='${{ env.SECONDARY_DOMAIN }}' CANONICAL_URL='${{ env.CANONICAL_URL }}' bash -s" <<'ENDSSH'
            set -euo pipefail

            if [ ! -f "/etc/letsencrypt/live/${PRIMARY_DOMAIN}/fullchain.pem" ]; then
              echo "SSL cert not found, keeping HTTP-only config"
              exit 0
            fi

            {
              printf '%s\n' 'server {'
              printf '%s\n' '    listen 80;'
              printf '%s\n' "    server_name ${PRIMARY_DOMAIN} ${SECONDARY_DOMAIN};"
              printf '%s\n' "    return 301 ${CANONICAL_URL}\$request_uri;"
              printf '%s\n' '}'
              printf '%s\n' ''
              printf '%s\n' 'server {'
              printf '%s\n' '    listen 443 ssl http2;'
              printf '%s\n' "    server_name ${PRIMARY_DOMAIN} ${SECONDARY_DOMAIN};"
              printf '%s\n' ''
              printf '%s\n' "    ssl_certificate /etc/letsencrypt/live/${PRIMARY_DOMAIN}/fullchain.pem;"
              printf '%s\n' "    ssl_certificate_key /etc/letsencrypt/live/${PRIMARY_DOMAIN}/privkey.pem;"
              printf '%s\n' '    ssl_protocols TLSv1.2 TLSv1.3;'
              printf '%s\n' '    ssl_ciphers HIGH:!aNULL:!MD5;'
              printf '%s\n' ''
              printf '%s\n' '    location / {'
              printf '%s\n' "        proxy_pass http://127.0.0.1:${DEPLOY_PORT};"
              printf '%s\n' '        proxy_http_version 1.1;'
              printf '%s\n' '        proxy_set_header Upgrade $http_upgrade;'
              printf '%s\n' '        proxy_set_header Connection "upgrade";'
              printf '%s\n' '        proxy_set_header Host $host;'
              printf '%s\n' '        proxy_set_header X-Real-IP $remote_addr;'
              printf '%s\n' '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;'
              printf '%s\n' '        proxy_set_header X-Forwarded-Proto $scheme;'
              printf '%s\n' '        proxy_read_timeout 86400;'
              printf '%s\n' '    }'
              printf '%s\n' '}'
            } > /etc/nginx/sites-available/palmital

            nginx -t
            systemctl reload nginx
          ENDSSH

      - name: Post-deploy health check
        env:
          SSHPASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no ${{ env.VPS_USER }}@${{ env.VPS_HOST }} \
            "APP_ROOT='${{ env.APP_ROOT }}' DEPLOY_PORT='${{ env.DEPLOY_PORT }}' bash -s" <<'ENDSSH'
            set -euo pipefail

            CURRENT_DIR="$APP_ROOT/current"
            COMPOSE_FILE="$CURRENT_DIR/docker-compose.production.yml"
            ENV_FILE="$CURRENT_DIR/.env"

            compose() {
              docker compose -p palmital -f "$COMPOSE_FILE" --env-file "$ENV_FILE" "$@"
            }

            service_id() {
              compose ps -q "$1"
            }

            service_state() {
              local id
              id="$(service_id "$1")"
              if [ -z "$id" ]; then
                echo "not_found"
                return
              fi
              docker inspect --format '{{.State.Status}}' "$id" 2>/dev/null || echo "not_found"
            }

            service_health() {
              local id
              id="$(service_id "$1")"
              if [ -z "$id" ]; then
                echo "not_found"
                return
              fi
              docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}no_healthcheck{{end}}' "$id" 2>/dev/null || echo "not_found"
            }

            dump_logs() {
              local service="$1"
              echo "--- logs: $service ---" >&2
              compose logs --no-color --tail=80 "$service" >&2 || true
            }

            echo "Running post-deploy health check..."
            compose ps || true

            for i in $(seq 1 30); do
              API_STATE="$(service_state api)"
              API_HEALTH="$(service_health api)"
              WEB_STATE="$(service_state web)"
              WEB_HEALTH="$(service_health web)"
              WEB_HTTP="$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "http://127.0.0.1:${DEPLOY_PORT}/health" 2>/dev/null || true)"
              WEB_HTTP="${WEB_HTTP:-000}"

              if [ "$API_STATE" = "running" ] && [ "$API_HEALTH" = "healthy" ] && \
                 [ "$WEB_STATE" = "running" ] && [ "$WEB_HEALTH" = "healthy" ] && \
                 [ "$WEB_HTTP" = "200" ]; then
                echo "Health check passed: api=${API_HEALTH} web=${WEB_HEALTH} http=${WEB_HTTP}"
                exit 0
              fi

              if [ "$API_STATE" = "exited" ] || [ "$API_STATE" = "dead" ] || [ "$API_STATE" = "not_found" ]; then
                dump_logs api
                exit 1
              fi

              if [ "$WEB_STATE" = "exited" ] || [ "$WEB_STATE" = "dead" ] || [ "$WEB_STATE" = "not_found" ]; then
                dump_logs web
                exit 1
              fi

              echo "Attempt $i/30: api_state=$API_STATE api_health=$API_HEALTH web_state=$WEB_STATE web_health=$WEB_HEALTH web_http=$WEB_HTTP"
              sleep 5
            done

            echo "Health check failed after 150s" >&2
            compose ps >&2 || true
            dump_logs api
            dump_logs web
            exit 1
          ENDSSH

      - name: Notify success
        run: |
          echo "Deployment ${{ steps.release.outputs.version }} completed successfully"
          echo "URL: ${{ env.CANONICAL_URL }}"
