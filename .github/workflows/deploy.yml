name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  WEBHOOK_URL: https://www.palmitaldigital.com.br/webhook-deploy
  HEALTH_URL: https://www.palmitaldigital.com.br/health

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 90

    environment:
      name: production
      url: https://www.palmitaldigital.com.br

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger deploy webhook
        run: |
          echo "Triggering deploy on VPS via webhook..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ env.WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"ref\": \"$GITHUB_SHA\"}" \
            --max-time 15)

          if [ "$HTTP_STATUS" = "202" ]; then
            echo "Deploy triggered successfully (HTTP 202)"
          else
            echo "ERROR: Webhook returned HTTP $HTTP_STATUS" >&2
            exit 1
          fi

      - name: Wait for deploy to complete
        timeout-minutes: 75
        run: |
          echo "Waiting for deploy to complete..."
          COMMIT_SHORT="${GITHUB_SHA:0:7}"
          sleep 30

          for attempt in $(seq 1 80); do
            echo "Health check attempt $attempt/80 (${COMMIT_SHORT})..."

            RESPONSE=$(curl -fsS --max-time 10 "${{ env.HEALTH_URL }}" 2>/dev/null || echo "")

            if echo "$RESPONSE" | grep -q '"status":"ok"'; then
              # Verificar se ja e o commit novo
              DEPLOYED=$(echo "$RESPONSE" | grep -o '"version":"[^"]*"' | cut -d'"' -f4 || echo "")
              echo "  status=ok version=$DEPLOYED"
              if echo "$DEPLOYED" | grep -q "$COMMIT_SHORT"; then
                echo "Deploy verified: $DEPLOYED is live!"
                exit 0
              fi
            else
              echo "  app not responding yet..."
            fi

            sleep 30
          done

          echo "ERROR: Deploy did not complete within timeout" >&2
          exit 1

      - name: Notify success
        run: |
          echo "Deployment of ${GITHUB_SHA:0:7} completed successfully"
          echo "URL: ${{ env.HEALTH_URL }}"
