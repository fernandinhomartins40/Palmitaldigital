name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  APP_ROOT: /opt/palmital
  DEPLOY_PORT: "7000"
  PRIMARY_DOMAIN: palmitaldigital.com.br
  SECONDARY_DOMAIN: www.palmitaldigital.com.br
  CANONICAL_URL: https://www.palmitaldigital.com.br
  SSL_EMAIL: admin@palmitaldigital.com.br

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: self-hosted
    timeout-minutes: 90

    environment:
      name: production
      url: https://www.palmitaldigital.com.br

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version
        id: release
        run: echo "version=$(git rev-parse --short HEAD)-$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Pre-deploy cleanup
        run: |
          docker compose -p palmital ps -aq --filter status=exited 2>/dev/null \
            | xargs -r docker rm -f 2>/dev/null || true
          docker image prune -f >/dev/null 2>&1 || true
          docker builder prune -af >/dev/null 2>&1 || true
          sync && echo 1 | sudo tee /proc/sys/vm/drop_caches > /dev/null
          free -h
          df -h /

      - name: Copy source to release dir
        run: |
          RELEASE_DIR="${{ env.APP_ROOT }}/releases/${{ steps.release.outputs.version }}"
          mkdir -p "$RELEASE_DIR"
          rsync -a --exclude=.git "$GITHUB_WORKSPACE/" "$RELEASE_DIR/"

      - name: Ensure .env exists
        run: |
          ENV_FILE="${{ env.APP_ROOT }}/.env"
          touch "$ENV_FILE" && chmod 600 "$ENV_FILE"

          get_env()   { awk -F= -v k="$1" '$1==k{sub(/^[^=]*=/,"");print;exit}' "$ENV_FILE"; }
          upsert_env() {
            local tmp; tmp="$(mktemp)"
            awk -v k="$1" -v v="$2" 'BEGIN{u=0} index($0,k"=")==1{print k"="v;u=1;next}{print} END{if(!u)print k"="v}' "$ENV_FILE" > "$tmp"
            mv "$tmp" "$ENV_FILE"
          }
          ensure_env()  { [ -z "$(get_env "$1"|tr -d '\r')" ] && upsert_env "$1" "$2" || true; }
          ensure_hex()  { [ -z "$(get_env "$1"|tr -d '\r')" ] && upsert_env "$1" "$(openssl rand -hex "$2")" || true; }
          ensure_alnum(){ [ -z "$(get_env "$1"|tr -d '\r')" ] && upsert_env "$1" "$(openssl rand -hex 32|cut -c1-"$2")" || true; }

          ensure_env   "POSTGRES_USER"          "palmital"
          ensure_env   "POSTGRES_DB"            "palmital"
          ensure_hex   "POSTGRES_PASSWORD"      32
          ensure_hex   "JWT_SECRET"             32
          ensure_hex   "JWT_REFRESH_SECRET"     32
          ensure_env   "JWT_EXPIRES_IN"         "15m"
          ensure_env   "JWT_REFRESH_EXPIRES_IN" "30d"
          ensure_alnum "SEED_ADMIN_PASSWORD"    20
          ensure_env   "SEED_TEST_PASSWORD"     "Teste123456"
          upsert_env   "NODE_ENV"               "production"
          upsert_env   "PORT"                   "3001"
          upsert_env   "DEPLOY_PORT"            "${{ env.DEPLOY_PORT }}"
          upsert_env   "FRONTEND_URL"           "${{ env.CANONICAL_URL }}"

          PG_USER="$(get_env POSTGRES_USER|tr -d '\r')"
          PG_PASS="$(get_env POSTGRES_PASSWORD|tr -d '\r')"
          PG_DB="$(get_env POSTGRES_DB|tr -d '\r')"
          upsert_env "DATABASE_URL" "postgresql://${PG_USER}:${PG_PASS}@postgres:5432/${PG_DB}"
          chmod 600 "$ENV_FILE"

      - name: Deploy
        timeout-minutes: 75
        run: |
          APP_ROOT="${{ env.APP_ROOT }}" \
          RELEASE="${{ steps.release.outputs.version }}" \
          DEPLOY_PORT="${{ env.DEPLOY_PORT }}" \
          bash "${{ env.APP_ROOT }}/releases/${{ steps.release.outputs.version }}/.github/scripts/remote-deploy.sh"

      - name: Configure Nginx
        run: |
          D="${{ env.PRIMARY_DOMAIN }}"
          SD="${{ env.SECONDARY_DOMAIN }}"
          CU="${{ env.CANONICAL_URL }}"
          DP="${{ env.DEPLOY_PORT }}"
          mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled
          if [ -f "/etc/letsencrypt/live/${D}/fullchain.pem" ]; then
            {
              printf 'server {\n    listen 80;\n    server_name %s %s;\n    client_max_body_size 32m;\n    return 301 %s$request_uri;\n}\n' "$D" "$SD" "$CU"
              printf 'server {\n    listen 443 ssl http2;\n    server_name %s %s;\n    client_max_body_size 32m;\n' "$D" "$SD"
              printf '    ssl_certificate /etc/letsencrypt/live/%s/fullchain.pem;\n' "$D"
              printf '    ssl_certificate_key /etc/letsencrypt/live/%s/privkey.pem;\n' "$D"
              printf '    ssl_protocols TLSv1.2 TLSv1.3;\n    ssl_ciphers HIGH:!aNULL:!MD5;\n'
              printf '    location / {\n        proxy_pass http://127.0.0.1:%s;\n' "$DP"
              printf '        proxy_http_version 1.1;\n        proxy_set_header Upgrade $http_upgrade;\n'
              printf '        proxy_set_header Connection "upgrade";\n        proxy_set_header Host $host;\n'
              printf '        proxy_set_header X-Real-IP $remote_addr;\n'
              printf '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n'
              printf '        proxy_set_header X-Forwarded-Proto $scheme;\n        proxy_read_timeout 86400;\n    }\n}\n'
            } | sudo tee /etc/nginx/sites-available/palmital > /dev/null
          else
            {
              printf 'server {\n    listen 80;\n    server_name %s %s;\n    client_max_body_size 32m;\n' "$D" "$SD"
              printf '    location /.well-known/acme-challenge/ { root /var/www/certbot; }\n'
              printf '    location / {\n        proxy_pass http://127.0.0.1:%s;\n' "$DP"
              printf '        proxy_http_version 1.1;\n        proxy_set_header Host $host;\n'
              printf '        proxy_set_header X-Real-IP $remote_addr;\n        proxy_read_timeout 86400;\n    }\n}\n'
            } | sudo tee /etc/nginx/sites-available/palmital > /dev/null
          fi
          sudo ln -sf /etc/nginx/sites-available/palmital /etc/nginx/sites-enabled/palmital
          sudo nginx -t && sudo systemctl reload nginx

      - name: Health check
        run: |
          for i in $(seq 1 18); do
            if curl -fsS --max-time 5 "http://127.0.0.1:${{ env.DEPLOY_PORT }}/health" | grep -q '"status":"ok"'; then
              echo "OK"
              exit 0
            fi
            echo "Attempt $i/18..."
            sleep 5
          done
          exit 1

      - name: Notify success
        run: echo "Deployment ${{ steps.release.outputs.version }} done — ${{ env.CANONICAL_URL }}"
